<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>잇츠앤 가격 계산기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --gold:#C9A050; --gold2:#E8C96A;
  --dark:#18180F; --dark2:#202014; --dark3:#2A2A1C; --dark4:#333324;
  --cream:#F0EAD8; --cream2:#D8D0BC;
  --green:#3D5C35; --green2:#4F7545;
  --muted:#888870; --border:#38381E; --red:#C04840;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--dark); color:var(--cream); font-family:'Noto Serif KR',serif; min-height:100vh; padding-bottom:100px; }

/* HEADER */
.header { background:var(--dark2); border-bottom:1px solid var(--border); padding:14px 16px; position:sticky; top:0; z-index:200; display:flex; align-items:center; gap:12px; }
.header-logo { width:38px; height:38px; background:linear-gradient(135deg,var(--gold),var(--gold2)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.header-text h1 { font-size:15px; font-weight:700; color:var(--gold); letter-spacing:.08em; }
.header-text p { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px; }
.header-cart-btn { margin-left:auto; background:var(--dark3); border:1px solid var(--border); border-radius:20px; padding:7px 14px; color:var(--cream); font-family:'Noto Serif KR',serif; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:.15s; flex-shrink:0; }
.header-cart-btn:active { border-color:var(--gold); }
.cart-badge { background:var(--gold); color:var(--dark); font-size:10px; font-weight:700; font-family:'DM Mono',monospace; border-radius:10px; padding:1px 6px; display:none; }
.cart-badge.show { display:inline; }

/* TABS */
.cat-tabs { display:flex; background:var(--dark2); border-bottom:1px solid var(--border); position:sticky; top:67px; z-index:100; }
.cat-tab { flex:1; padding:12px 4px; border:none; background:transparent; color:var(--muted); font-family:'Noto Serif KR',serif; font-size:13px; cursor:pointer; border-bottom:2px solid transparent; transition:.2s; }
.cat-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* SEARCH */
.search-wrap { padding:12px 16px 8px; position:sticky; top:115px; z-index:90; background:var(--dark); }
.search-input { width:100%; padding:10px 14px; background:var(--dark3); border:1px solid var(--border); border-radius:8px; color:var(--cream); font-family:'Noto Serif KR',serif; font-size:14px; outline:none; }
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:var(--gold); }

/* LIST */
.product-list { padding:0 16px 20px; }
.brand-group { margin-top:16px; }
.brand-label { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.15em; font-family:'DM Mono',monospace; padding:0 0 6px; border-bottom:1px solid var(--border); margin-bottom:8px; }
.product-card { background:var(--dark2); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; transition:border-color .15s; }
.product-card.expanded { border-color:var(--gold); }
.card-main { display:flex; align-items:center; padding:12px 14px; gap:10px; cursor:pointer; }
.card-name { flex:1; min-width:0; }
.card-name .name { font-size:14px; font-weight:600; line-height:1.3; }
.card-name .sub { font-size:11px; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }
.card-price { font-size:15px; font-weight:700; color:var(--gold2); font-family:'DM Mono',monospace; white-space:nowrap; }
.card-chevron { color:var(--muted); font-size:12px; transition:transform .2s; margin-left:4px; }
.expanded .card-chevron { transform:rotate(180deg); }

/* PANEL */
.discount-panel { display:none; background:var(--dark3); border-top:1px solid var(--border); padding:14px; }
.expanded .discount-panel { display:block; }
.qty-row { display:flex; align-items:center; gap:0; margin-bottom:14px; }
.qty-label { font-size:12px; color:var(--muted); margin-right:10px; min-width:40px; }
.qty-btn { width:36px; height:36px; background:var(--dark4); border:1px solid var(--border); color:var(--cream); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:6px; transition:.15s; flex-shrink:0; }
.qty-btn:active { background:var(--gold); color:var(--dark); }
.qty-display { width:44px; text-align:center; font-size:18px; font-weight:700; font-family:'DM Mono',monospace; color:var(--cream); }
.disc-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:14px; }
.disc-cell { background:var(--dark4); border:1px solid var(--border); border-radius:7px; padding:7px 2px; text-align:center; cursor:pointer; transition:.15s; }
.disc-cell.active { background:var(--green); border-color:var(--green2); }
.disc-cell .pct { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; }
.disc-cell.active .pct { color:#8FC886; }
.disc-cell .dprice { font-size:11px; font-weight:700; color:var(--cream2); font-family:'DM Mono',monospace; margin-top:2px; }
.disc-cell.active .dprice { color:#fff; }
.result-box { background:var(--dark); border:1px solid var(--gold); border-radius:8px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.result-label { font-size:12px; color:var(--muted); }
.result-disc-note { font-size:10px; color:var(--green2); margin-top:2px; }
.result-total { font-size:22px; font-weight:700; color:var(--gold2); font-family:'DM Mono',monospace; }
.result-unit { font-size:11px; color:var(--muted); margin-top:2px; text-align:right; }
.add-cart-btn { width:100%; padding:11px; background:var(--gold); border:none; border-radius:8px; color:var(--dark); font-family:'Noto Serif KR',serif; font-size:14px; font-weight:700; cursor:pointer; transition:.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
.add-cart-btn:active { background:var(--gold2); transform:scale(.98); }

/* CART OVERLAY */
.cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:500; display:none; align-items:flex-end; }
.cart-overlay.open { display:flex; }
.cart-sheet { background:var(--dark2); border-top:1px solid var(--border); border-radius:18px 18px 0 0; width:100%; max-height:82vh; display:flex; flex-direction:column; animation:slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.cart-header { padding:16px 16px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
.cart-header h2 { font-size:16px; font-weight:700; color:var(--gold); }
.cart-close { background:var(--dark3); border:1px solid var(--border); color:var(--cream); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }
.cart-items { flex:1; overflow-y:auto; padding:0 16px; }
.cart-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:14px; }
.cart-item { display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--border); }
.cart-item:last-child { border-bottom:none; }
.ci-info { flex:1; min-width:0; }
.ci-name { font-size:13px; font-weight:600; line-height:1.3; }
.ci-sub { font-size:11px; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }
.ci-right { text-align:right; flex-shrink:0; }
.ci-total { font-size:14px; font-weight:700; color:var(--gold2); font-family:'DM Mono',monospace; }
.ci-unit { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:1px; }
.ci-del { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; flex-shrink:0; transition:.15s; }
.ci-del:active { border-color:var(--red); color:var(--red); }
.cart-footer { padding:14px 16px; border-top:1px solid var(--border); flex-shrink:0; background:var(--dark2); }
.cart-summary { background:var(--dark3); border:1px solid var(--gold); border-radius:10px; padding:14px; margin-bottom:12px; }
.cart-summary-row { display:flex; justify-content:space-between; align-items:baseline; }
.cart-summary-label { font-size:13px; color:var(--muted); }
.cart-summary-sub { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:3px; }
.cart-grand-total { font-size:28px; font-weight:700; color:var(--gold2); font-family:'DM Mono',monospace; }
.cart-clear-btn { width:100%; padding:11px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'Noto Serif KR',serif; font-size:13px; cursor:pointer; transition:.15s; }
.cart-clear-btn:active { border-color:var(--red); color:var(--red); }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--dark4); border:1px solid var(--gold); border-radius:20px; padding:8px 18px; font-size:13px; color:var(--gold2); opacity:0; transition:.25s; pointer-events:none; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:14px; }
</style>
</head>

  return cardState[id];
}
function getProduct(id) {
  const [cat,idx] = id.split('_');
  return (cat==='oil'?OILS:BALSAMICS)[+idx];
}
function calcUnit(p, disc) {
  return disc===0 ? p.price : (p.d[disc-1]??p.price);
}

function setCategory(cat) {
  currentCat=cat; expandedId=null;
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.cat-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&cat==='oil')||(i===1&&cat==='balsamic')));
  renderList();
}

function renderList() {
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const data=currentCat==='oil'?OILS:BALSAMICS;
  const brands={};
  data.forEach((p,i)=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!p.brand.toLowerCase().includes(q)) return;
    const id=currentCat+'_'+i;
    if(!brands[p.brand]) brands[p.brand]=[];
    brands[p.brand].push({...p,id});
  });
  const list=document.getElementById('productList');
  if(!Object.keys(brands).length){list.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  list.innerHTML=Object.entries(brands).map(([brand,products])=>`
    <div class="brand-group">
      <div class="brand-label">${brand}</div>
      ${products.map(p=>renderCard(p)).join('')}
    </div>`).join('');
}

function renderCard(p) {
  const isExp=expandedId===p.id;
  const s=getState(p.id);
  const up=calcUnit(p,s.disc);
  const total=up*s.qty;
  const discGrid=DISC_LABELS.map((label,i)=>{
    const dp=i===0?p.price:p.d[i-1];
    if(dp===null||dp===undefined) return '';
    return `<div class="disc-cell ${s.disc===i?'active':''}" onclick="setDisc('${p.id}',${i},event)">
      <div class="pct">${label}</div>
      <div class="dprice">${fmt(dp)}</div>
    </div>`;
  }).join('');
  return `
  <div class="product-card ${isExp?'expanded':''}" id="card_${p.id}">
    <div class="card-main" onclick="toggleCard('${p.id}')">
      <div class="card-name">
        <div class="name">${p.name}</div>
        <div class="sub">${p.brand} · ${p.vol} · ${p.country}</div>
      </div>
      <div class="card-price">${fmt(p.price)}</div>
      <div class="card-chevron">▼</div>
    </div>
    <div class="discount-panel">
      <div class="qty-row">
        <span class="qty-label">수량</span>
        <button class="qty-btn" onclick="changeQty('${p.id}',-1,event)">−</button>
        <div class="qty-display" id="qty_${p.id}">${s.qty}</div>
        <button class="qty-btn" onclick="changeQty('${p.id}',+1,event)">+</button>
      </div>
      <div class="disc-grid">${discGrid}</div>
      <div class="result-box">
        <div>
          <div class="result-label" id="rlabel_${p.id}">${s.qty}병 × ${fmt(up)}</div>
          <div class="result-disc-note" id="rnote_${p.id}">${s.disc>0?DISC_LABELS[s.disc]+' 할인 적용':''}</div>
        </div>
        <div>
          <div class="result-total" id="total_${p.id}">${fmt(total)}</div>
          <div class="result-unit" id="runit_${p.id}">병당 ${fmt(up)}</div>
        </div>
      </div>
      <button class="add-cart-btn" onclick="addToCart('${p.id}',event)">🛒 장바구니에 담기</button>
    </div>
  </div>`;
}

function toggleCard(id) {
  expandedId=expandedId===id?null:id;
  renderList();
  if(expandedId) setTimeout(()=>{const el=document.getElementById('card_'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function changeQty(id,delta,e) {
  e.stopPropagation();
  const s=getState(id);
  s.qty=Math.max(1,Math.min(99,s.qty+delta));
  refreshResult(id);
}

function setDisc(id,idx,e) {
  e.stopPropagation();
  getState(id).disc=idx;
  const card=document.getElementById('card_'+id);
  if(card) card.querySelectorAll('.disc-cell').forEach((el,i)=>el.classList.toggle('active',i===idx));
  refreshResult(id);
}

function refreshResult(id) {
  const p=getProduct(id); const s=getState(id);
  const up=calcUnit(p,s.disc); const total=up*s.qty;
  const el=n=>document.getElementById(n+'_'+id);
  if(el('qty')) el('qty').textContent=s.qty;
  if(el('total')) el('total').textContent=fmt(total);
  if(el('rlabel')) el('rlabel').textContent=`${s.qty}병 × ${fmt(up)}`;
  if(el('rnote')) el('rnote').textContent=s.disc>0?DISC_LABELS[s.disc]+' 할인 적용':'';
  if(el('runit')) el('runit').textContent=`병당 ${fmt(up)}`;
}

function addToCart(id,e) {
  e.stopPropagation();
  const p=getProduct(id); const s=getState(id);
  const up=calcUnit(p,s.disc);
  const existing=cart.find(c=>c.id===id&&c.disc===s.disc);
  if(existing){existing.qty+=s.qty;existing.total=existing.unitPrice*existing.qty;}
  else cart.push({id,cartId:Date.now()+'_'+Math.random(),name:p.name,brand:p.brand,vol:p.vol,qty:s.qty,disc:s.disc,discLabel:DISC_LABELS[s.disc],unitPrice:up,total:up*s.qty});
  updateBadge();
  showToast(`🛒 "${p.name}" 담았어요!`);
}

function updateBadge() {
  const total=cart.reduce((a,c)=>a+c.qty,0);
  const b=document.getElementById('cartBadge');
  b.textContent=total; b.classList.toggle('show',total>0);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function openCart(){renderCart();document.getElementById('cartOverlay').classList.add('open');}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('cartOverlay'))closeCart();}

function renderCart() {
  const el=document.getElementById('cartItems');
  if(!cart.length){
    el.innerHTML='<div class="cart-empty">장바구니가 비어있어요 🫒</div>';
    document.getElementById('cartGrandTotal').textContent='₩0';
    document.getElementById('cartTotalItems').textContent='0종 · 0병';
    return;
  }
  el.innerHTML=cart.map(c=>`
    <div class="cart-item">
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-sub">${c.brand} · ${c.vol} · ${c.qty}병 · ${c.discLabel}</div>
      </div>
      <div class="ci-right">
        <div class="ci-total">${fmt(c.total)}</div>
        <div class="ci-unit">병당 ${fmt(c.unitPrice)}</div>
      </div>
      <button class="ci-del" onclick="removeFromCart('${c.cartId}')">✕</button>
    </div>`).join('');
  const grand=cart.reduce((a,c)=>a+c.total,0);
  const totalQty=cart.reduce((a,c)=>a+c.qty,0);
  document.getElementById('cartGrandTotal').textContent=fmt(grand);
  document.getElementById('cartTotalItems').textContent=`${cart.length}종 · 총 ${totalQty}병`;
}

function removeFromCart(cartId){cart=cart.filter(c=>c.cartId!==cartId);updateBadge();renderCart();}
function clearCart(){if(!cart.length)return;cart=[];updateBadge();renderCart();}

renderList();
</script>
</body>
</html>
